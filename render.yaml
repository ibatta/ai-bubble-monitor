services:
  - type: web
    name: ai-bubble-monitor
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-bubble-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRED_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_TO
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false

databases:
  - name: ai-bubble-db
    plan: free
    databaseName: ai_bubble
